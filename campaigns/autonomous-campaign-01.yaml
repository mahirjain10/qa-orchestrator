name: Login E2E Test
description: End-to-end test verifying login functionality with recovery support
version: "1.0"
config:
  timeout: 300s
  retry_limit: 2
  parallel_limit: 1
flows:
  - id: auth-flow
    name: Login Flow
    description: Verify user can login with valid credentials
    goal: >
      Navigate to https://practicetestautomation.com/practice-test-login/, attempt
      login with username 'student' and password 'Password123', and verify you are logged
      in.
    start_url: https://practicetestautomation.com/practice-test-login/
    mode: autonomous
    priority: high
    depends_on: []