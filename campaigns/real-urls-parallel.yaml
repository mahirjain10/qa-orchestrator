name: Real URLs Parallel Campaign
description: Tests orchestration throughput with 8 flows - 5 independent + 3 dependent - using only verified real URLs
version: "1.0"
config:
  timeout: 900s
  retry_limit: 2
  parallel_limit: 3

flows:
  - id: flow-alpha
    name: Alpha - Login Page
    description: Verify login page loads
    goal: Navigate to https://practicetestautomation.com/practice-test-login/ and verify the page loads with the login form visible including username input, password input, and submit button
    start_url: https://practicetestautomation.com/practice-test-login/
    mode: autonomous
    priority: high
    depends_on: []

  - id: flow-beta
    name: Beta - Root Page
    description: Navigate to root page
    goal: Navigate to https://practicetestautomation.com/ and verify the main page loads with navigation links and course information visible
    start_url: https://practicetestautomation.com/
    mode: autonomous
    priority: high
    depends_on: []

  - id: flow-gamma
    name: Gamma - Exception Page
    description: Navigate to exceptions page
    goal: Navigate to https://practicetestautomation.com/practice-test-exceptions/ and verify the exceptions page loads with the expected content and buttons visible
    start_url: https://practicetestautomation.com/practice-test-exceptions/
    mode: autonomous
    priority: high
    depends_on: []

  - id: flow-delta
    name: Delta - Success Page
    description: Navigate to logged-in success page
    goal: Navigate to https://practicetestautomation.com/logged-in-successfully/ and verify the success message 'Logged In Successfully' is displayed and the logout button is visible
    start_url: https://practicetestautomation.com/logged-in-successfully/
    mode: autonomous
    priority: medium
    depends_on: []

  - id: flow-epsilon
    name: Epsilon - Login Title Check
    description: Navigate to login page and verify its title
    goal: Navigate to https://practicetestautomation.com/practice-test-login/ and verify the page heading and description text explain this is a practice test login page
    start_url: https://practicetestautomation.com/practice-test-login/
    mode: autonomous
    priority: medium
    depends_on: []

  - id: flow-zeta
    name: Zeta - Post-Login Validation
    description: Validates elements after login flow
    goal: After flow-alpha confirms the login page is accessible, navigate to the login page again and verify all form elements are properly labeled and accessible
    start_url: https://practicetestautomation.com/practice-test-login/
    mode: autonomous
    priority: high
    depends_on:
      - flow-alpha

  - id: flow-eta
    name: Eta - Cross-Page Navigation
    description: Tests navigation between multiple pages
    goal: After flow-gamma and flow-delta confirm their pages load, visit the exceptions page, then visit the success page, and verify both pages load correctly
    start_url: https://practicetestautomation.com/
    mode: autonomous
    priority: medium
    depends_on:
      - flow-gamma
      - flow-delta

  - id: flow-theta
    name: Theta - Final Summary
    description: Final validation after all other flows
    goal: After flow-zeta and flow-eta complete, navigate to the main practice test page and verify the overall site structure is intact with navigation links to all sub-pages visible
    start_url: https://practicetestautomation.com/
    mode: autonomous
    priority: low
    depends_on:
      - flow-zeta
      - flow-eta
